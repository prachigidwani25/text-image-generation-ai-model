<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AI Chatbot & Image Generator</title>
    <link rel="stylesheet" href="./style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  </head>
  <body>
    <div id="app">
      <header class="app-header">
        <h1>Neon AI Studio</h1>
        <div class="toggle-container">
          <span class="toggle-label" id="chat-label">Chat Mode</span>
          <label class="switch">
            <input type="checkbox" id="mode-toggle">
            <span class="slider round"></span>
          </label>
          <span class="toggle-label" id="art-label">Art Mode</span>
        </div>
      </header>
      
      <main class="chat-container">
        <div id="chat-messages" class="chat-messages">
          <!-- Messages will be injected here -->
          <div class="message ai-message initial-message" style="display: none;">
            <div class="message-content">Hello! I am ready to assist you. Ask me a question or switch to Art Mode to generate an image.</div>
          </div>
        </div>
        
        <div class="input-area">
          <form id="chat-form">
            <input type="text" id="user-input" placeholder="Type a message..." autocomplete="off" required />
            <button type="submit" id="send-button">
              <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
            </button>
          </form>
        </div>
      </main>
    </div>
    <script type="module" src="./main.js"></script>
  </body>
</html>
